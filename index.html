<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizo Global Translator | World Language 200+</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
      .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
      .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #ffaa00;
        }
      .subtitle {
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
      .box {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #00ff88;
        }
        h2 {
            color: #00ff88;
            margin-bottom: 15px;
        }
      .lang-box {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 20px 0;
        }
        select {
            background: #333;
            color: white;
            border: 1px solid #00ff88;
            padding: 12px;
            font-size: 1rem;
            border-radius: 10px;
            width: 100%;
        }
      .arrow {
            color: #00ff88;
            font-size: 1.5rem;
        }
        button {
            background: #00ff88;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background: #00cc6a; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #ffaa00;
            min-height: 80px;
            word-wrap: break-word;
        }
      .footer {
            margin-top: 40px;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌍 MIZO GLOBAL</div>
        <h1>World Language Translator</h1>
        <p class="subtitle">Mizo • English • 200+ Countries</p>

        <div class="box">
            <h2>Live Voice Translator</h2>
            <p>Select languages and start talking</p>

            <div class="lang-box">
                <select id="fromLang">
                    <option value="en-US">English</option>
                    <option value="hi-IN">Hindi</option>
                    <option value="zh-CN">Chinese</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="ar-SA">Arabic</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="ko-KR">Korean</option>
                    <option value="de-DE">German</option>
                </select>
                <div class="arrow">→</div>
                <select id="toLang">
                    <option value="English">English</option>
                    <option value="Mizo">Mizo</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Korean">Korean</option>
                    <option value="German">German</option>
                </select>
            </div>

            <button id="talkBtn" onclick="startTranslator()">🎤 START TALKING</button>
            <div id="status">Select languages and press the button...</div>
        </div>

        <div class="footer">
            <p>UDYAM-MZ-03-0010154 | Made in Lunglei, Mizoram</p>
            <p>© 2026 Mizo Global. Powered by Gemini AI</p>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6fQpC2RdsyzJkAOtoCcxwJZ2J4UsqEpykM7zCGPmT2gI";
        let recognition;
        let isListening = false;

        function startTranslator() {
            const fromLangCode = document.getElementById('fromLang').value;
            const fromLangText = document.getElementById('fromLang').selectedOptions[0].text;
            const toLangText = document.getElementById('toLang').value;
            const status = document.getElementById('status');
            const talkBtn = document.getElementById('talkBtn');

            if (isListening) {
                recognition.stop();
                return;
            }

            if (!('webkitSpeechRecognition' in window)) {
                status.innerHTML = '❌ Chrome browser chiah a support. Phone Chrome hmang rawh.';
                status.style.color = "#ff4444";
                return;
            }

            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = fromLangCode;

            isListening = true;
            talkBtn.innerHTML = '🛑 STOP LISTENING';
            talkBtn.style.background = '#ff4444';
            status.innerHTML = '🎤 Listening: ' + fromLangText + ' → ' + toLangText + '<br><br>SPEAK NOW...';
            status.style.color = "#00ff88";

            recognition.start();

            recognition.onresult = async function(event) {
                const spokenText = event.results[0][0].transcript;
                status.innerHTML = '⏳ Translating: "' + spokenText + '"<br><br>Gemini AI is thinking...';
                talkBtn.disabled = true;

                try {
                    const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_API_KEY, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `You are a professional translator. Translate the following text to ${toLangText}. Only output the direct translation, no explanations, no notes: ${spokenText}`
                                }]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) { throw new Error(data.error.message); }

                    const translatedText = data.candidates[0].content.parts[0].text.trim();
                    status.innerHTML = '✅ You said: ' + spokenText + '<br><br>🔊 Translation: ' + translatedText;

                    const utterance = new SpeechSynthesisUtterance(translatedText);
                    utterance.lang = document.getElementById('fromLang').value;
                    if(toLangText === 'Mizo') { utterance.lang = 'en-US'; }
                    speechSynthesis.speak(utterance);

                } catch (error) {
                    status.innerHTML = '❌ Error: ' + error.message + '<br>Key a dik lo emaw Net a chhe emaw. A block a nih chuan thu tha lo i sawi a ni mai thei.';
                    status.style.color = "#ff4444";
                } finally {
                    resetButton();
                }
            };

            recognition.onerror = function(event) {
                status.innerHTML = '❌ Mic Error: ' + event.error + '<br>Allow hmet la, ring deuh in tawng rawh';
                status.style.color = "#ff4444";
                resetButton();
            };

            recognition.onend = function() {
                if (isListening) { resetButton(); }
            };
        }

        function resetButton() {
            const talkBtn = document.getElementById('talkBtn');
            isListening = false;
            talkBtn.innerHTML = '🎤 START TALKING';
            talkBtn.style.background = '#00ff88';
            talkBtn.disabled = false;
        }
    </script>
</body>
</html>
